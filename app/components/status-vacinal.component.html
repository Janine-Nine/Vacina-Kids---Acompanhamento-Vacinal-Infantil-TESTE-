<ion-badge
  *ngIf="status === 'EM_DIA'"
  color="success">

  Em Dia

</ion-badge>

<ion-badge
  *ngIf="status === 'PENDENTE'"
  color="warning">

  Pendente

</ion-badge>

<ion-badge
  *ngIf="status === 'ATRASADA'"
  color="danger">

  Atrasada

</ion-badge>

<ion-badge
  *ngIf="status === 'APLICADA'"
  color="success">

  Aplicada

</ion-badge>
