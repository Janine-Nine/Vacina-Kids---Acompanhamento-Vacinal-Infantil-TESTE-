<div class="login-container">
  <div class="login-box">
    <!-- Logo / Header -->
    <div class="login-header">
      <h1>VacinaKids</h1>
      <p class="subtitle">Acompanhamento Vacinal Infantil</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <!-- Email -->
      <div class="form-group">
        <label class="label-required">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="seu.email@example.com"
          class="input-field"
          required
        >
        <div class="form-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Email inválido
        </div>
      </div>

      <!-- Senha -->
      <div class="form-group">
        <label class="label-required">Senha</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Digite sua senha"
          class="input-field"
          required
        >
        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
        >
          {{ showPassword ? '🙈 Ocultar' : '👁️ Mostrar' }}
        </button>
        <div class="form-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Senha é obrigatória
        </div>
      </div>

      <!-- Erro geral -->
      <div class="alert alert-danger" *ngIf="loginError">
        {{ loginError }}
      </div>

      <!-- Loading -->
      <div class="alert alert-info" *ngIf="loading">
        Carregando...
      </div>

      <!-- Botões -->
      <div class="button-group">
        <button
          type="submit"
          class="btn btn-primary btn-lg btn-block"
          [disabled]="loginForm.invalid || loading"
        >
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </div>
    </form>

    <!-- Link para registro -->
    <div class="login-footer">
      <p>Não tem conta?
        <a [routerLink]="['/register']" class="link-register">Registre-se aqui</a>
      </p>
    </div>
  </div>

  <!-- Ilustração -->
  <div class="login-illustration">
    <div class="illustration-content">
      <h2>Bem-vindo!</h2>
      <p>Controle a vacinação das suas crianças de forma segura e organizada</p>
    </div>
  </div>
</div>
