<div class="page-container">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>Crianças</ion-title>
      <ion-buttons slot="end">
        <button class="btn btn-secondary" (click)="logout()">Sair</button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <div class="page-header">
      <h1>Minhas Crianças</h1>
      <button class="btn btn-primary" (click)="addChild()">+ Adicionar Criança</button>
    </div>

    <div class="cards-grid">
      <div class="card" *ngFor="let child of children">
        <h3>{{ child.name }}</h3>
        <p><strong>Idade:</strong> {{ child.age }} anos</p>
        <p><strong>Nascimento:</strong> {{ child.birthDate | date: 'dd/MM/yyyy' }}</p>
        <div class="card-actions">
          <button class="btn btn-sm btn-primary" (click)="viewChild(child.id)">Ver Detalhes</button>
          <button class="btn btn-sm btn-accent" (click)="editChild(child.id)">Editar</button>
        </div>
      </div>
    </div>

    <div *ngIf="children.length === 0" class="empty-state">
      <p>Nenhuma criança cadastrada ainda. Clique em "Adicionar Criança" para começar.</p>
    </div>
  </ion-content>
</div>
