<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VacinaKids - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <div class="text-center">

            <img
                src="img/logo-vacina-kids.png"
                alt="Logo Vacina Kids"
                class="logo-login">

            <h1 class="titulo-login">
                💉 Vacina Kids
            </h1>

            <p class="subtitulo-login">
                Sistema de Acompanhamento Vacinal Infantil
            </p>

        </div>


    <main>

        <form id="loginForm">

            <div class="mb-3">

                <label class="form-label">
                    E-mail
                </label>

                <input
                    id="email"
                    type="email"
                    class="form-control"
                    placeholder="Digite seu e-mail"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Senha
                </label>

                <input
                    id="senha"
                    type="password"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required>

            </div>

            <div class="d-flex justify-content-between mb-3">

                <div class="form-check">

                    <input
                        id="lembrar"
                        class="form-check-input"
                        type="checkbox">

                    <label class="form-check-label">
                        Lembrar-me
                    </label>

                </div>

                <a href="#" class="link-login" title="Recuperar senha">
                    Esqueci minha senha
                </a>

            </div>

            <button
                type="submit"
                class="btn btn-login w-100">

                🔐 Entrar

            </button>

        </form>

        <hr>

        <p class="text-center mb-0">

            Não possui conta?

            <a href="cadastro.html" class="link-login">
                📝 Cadastre-se
            </a>

        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
