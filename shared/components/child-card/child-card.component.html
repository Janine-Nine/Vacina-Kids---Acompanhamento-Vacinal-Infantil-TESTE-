<ion-card>

  <ion-card-content>

    <div class="child-header">

      <ion-avatar>
        <img src="assets/avatar.png">
      </ion-avatar>

      <div>

        <h2>{{ child.name }}</h2>

        <p>
          {{ child.birthDate }}
        </p>

      </div>

    </div>

    <ion-progress-bar
      [value]="progress">
    </ion-progress-bar>

    <small>
      {{ progress * 100 }}% em dia
    </small>

  </ion-card-content>

</ion-card>
