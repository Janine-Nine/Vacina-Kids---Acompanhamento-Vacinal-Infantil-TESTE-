<ion-card>

  <img
    *ngIf="campaign.imageUrl"
    [src]="campaign.imageUrl">

  <ion-card-header>

    <ion-card-title>
      {{ campaign.title }}
    </ion-card-title>

  </ion-card-header>

  <ion-card-content>

    <p>
      {{ campaign.description }}
    </p>

    <p>
      Público:
      {{ campaign.targetAudience }}
    </p>

  </ion-card-content>

</ion-card>
