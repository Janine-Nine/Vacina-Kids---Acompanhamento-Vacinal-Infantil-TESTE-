<ion-chip
  *ngIf="status === 'Aplicada'"
  color="success">

  <ion-label>
    Aplicada
  </ion-label>

</ion-chip>

<ion-chip
  *ngIf="status === 'Pendente'"
  color="warning">

  <ion-label>
    Pendente
  </ion-label>

</ion-chip>

<ion-chip
  *ngIf="status === 'Atrasada'"
  color="danger">

  <ion-label>
    Atrasada
  </ion-label>

</ion-chip>
